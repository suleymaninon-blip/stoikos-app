<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stoikos</title>
<meta name="description" content="Stoikos — coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #14120e;
  color: #ece4d4;
  font-family: 'Jost', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.scene {
  text-align: center;
  position: relative;
  user-select: none;
}

.glow-bg {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(194,168,120,0.07) 0%, transparent 65%);
  pointer-events: none;
  animation: glowPulse 4s ease-in-out 2.6s infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: .7; transform: translate(-50%,-50%) scale(1); }
  50%       { opacity: 1;  transform: translate(-50%,-50%) scale(1.08); }
}

.omega {
  font-family: 'Cinzel', serif;
  font-size: clamp(100px, 20vw, 160px);
  color: #d8c49a;
  line-height: 0.85;
  display: block;
  opacity: 0;
  animation: omegaReveal 2.2s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
  filter: drop-shadow(0 0 40px rgba(216,196,154,0.18));
}
@keyframes omegaReveal {
  0%   { opacity: 0; transform: scale(0.75); filter: drop-shadow(0 0 80px rgba(216,196,154,0.6)); }
  45%  { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(216,196,154,0.35)); }
  100% { opacity: 1; transform: scale(1);   filter: drop-shadow(0 0 20px rgba(216,196,154,0.12)); }
}

.brand {
  font-family: 'Cinzel', serif;
  font-size: clamp(18px, 4vw, 28px);
  letter-spacing: clamp(8px, 2vw, 14px);
  color: #cabfa8;
  margin-top: 24px;
  opacity: 0;
  animation: fadeUp 1s ease 2.8s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

footer {
  position: fixed;
  bottom: 28px; left: 0; right: 0;
  text-align: center;
  font-size: 12px;
  color: #5a5348;
  opacity: 0;
  animation: fadeUp 1s ease 3.4s both;
}
footer a { color: #6b6453; text-decoration: none; }
footer a:hover { color: #c2a878; }
</style>
</head>
<body>

<div class="glow-bg"></div>

<div class="scene">
  <span class="omega">Ω</span>
  <div class="brand">STOIKOS</div>
</div>

<footer>
  <a href="privacy.html" id="privacy-link">Privacy Policy</a>
  &nbsp;·&nbsp;
  <a href="mailto:support@stoikos.app">support@stoikos.app</a>
  &nbsp;·&nbsp;
  © 2026 Stoikos
</footer>

<script>
const lang = (navigator.language || '').toLowerCase();
if (lang.startsWith('tr')) {
  document.getElementById('privacy-link').href = 'gizlilik.html';
  document.getElementById('privacy-link').textContent = 'Gizlilik Politikası';
}
</script>
</body>
</html>
